<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="src/style.css">
</head>
<body>
    <div id="app">
        <div id="top-section">
            <div id="current-weather" class="current-weather">
                <!-- Current weather will be populated here -->
            </div>
            <div id="daily-weather" class="daily-weather">
                <!-- Daily weather will be populated here -->
                <div class="slider">
                    <button class="arrow left-arrow">←</button>
                    <div class="daily-weather-container">
                        <!-- Daily weather data will be populated here -->
                    </div>
                    <button class="arrow right-arrow">→</button>
                </div>
            </div>
        </div>
        <div id="hourly-weather" class="hourly-weather">
            <!-- Hourly weather will be populated here -->
            <div class="slider">
                <button class="arrow left-arrow">←</button>
                <div class="hourly-weather-container">
                    <!-- Hourly weather data will be populated here -->
                </div>
                <button class="arrow right-arrow">→</button>
            </div>
        </div>
    </div>
    <script type="module" src="src/index.js"></script>
</body>
</html>
